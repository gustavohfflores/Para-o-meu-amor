<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2;
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* Topo */
        header {
            padding: 80px 20px;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 0 0 10px 0; font-size: 2.8rem; font-weight: bold; }
        header p { margin: 0; font-size: 1.2rem; opacity: 0.9; }

        .container {
            max-width: 900px;
            width: 92%;
            margin: 40px auto;
        }

        /* Seções Gerais */
        section {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            margin-bottom: 50px;
        }
        h2 { color: #ff758c; font-size: 1.8rem; margin-top: 0; margin-bottom: 20px; }

        /* 1. Contador Avançado */
        .timer-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .time-box {
            background: #ffeef2;
            padding: 15px;
            border-radius: 12px;
            min-width: 90px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .time-box span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #ff4757;
        }
        .time-box label { font-size: 0.85rem; color: #777; font-weight: bold; }

        /* 2. Spotify Widget */
        .spotify-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        /* 3. Linha do Tempo / Galeria com Animação de Scroll */
        .timeline {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }
        .timeline-item {
            background: #fff;
            border: 1px solid #ffdae0;
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
